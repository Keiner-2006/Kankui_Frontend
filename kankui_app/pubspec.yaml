name: kankui_app
description: "Kankui - Aplicación para la recuperación de la lengua Kankuamo"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  uuid: ^4.4.0
  sqflite: ^2.3.0
  path: ^1.8.3
  supabase_flutter: ^2.3.0
  connectivity_plus: ^5.0.2  # Para detectar conexión
  get_it: ^7.6.4
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  audioplayers: ^5.0.0  # Reproducción de audios
  intl: ^0.20.2
  fl_chart: ^1.2.0
  pdf: ^3.12.0
  printing: ^5.14.3
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
